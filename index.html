<html>
    <head>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="crossorigin=""/> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="crossorigin=""></script>
    
    	<style>
		html, body {
			height: 100%;
			margin: 0;}
		.leaflet-container {
			height: 600px;
			width: 900px;
			max-width: 100%;
			max-height: 100%;}
	    </style>

</head>
    <body>
        <main class="page-layout">
            <h1>{{ title }}</h1>
            <p>Velkommen til vores side</p>

            <!-- indtast koordinater-->
            <form method="POST" action="{{ url_for('index') }}">
                <label for="input_coordinates">Enter koordinater:</label>
                <input type="text" id="post_input_id" name="post_input" required>
                <button type="submit">Send</button>
            </form>
            <!-- vis indtastede koordinater -->
            <input type="hidden" id="input_coordinate_x" value="{{ coorx }}">
            <input type="hidden" id="input_coordinate_y" value="{{ coory }}">
            <div class="App-content">
                <p>Du indtastede: {{ coorx }}, {{ coory }}</p>
            </div>  
            <div class="map-wrapper">
                <div id="map"></div>
            </div>
        </main>
         
        <script>
    
        const coorx = document.getElementById('input_coordinate_x').value;
        const coory = document.getElementById('input_coordinate_y').value;
	    // const map = L.map('map').setView([51.505, -0.09], 13);
        const map = L.map('map').setView([ coorx, coory], 13);
    

	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
        // var marker = L.marker([51.5, -0.09]).addTo(map);
	var marker = L.marker([coorx, coory]).addTo(map);
     </script>
    
    </body>
</html>
